; PHP-FPM pool configuration (Laravel high load)

[www]

user = www-data
group = www-data

listen = 0.0.0.0:9000
; =========================
; PROCESS MANAGEMENT
; =========================
pm = dynamic

; ⚠️ Adjust based on CPU cores:
; Rule: CPU cores * 10–15 workers
pm.max_children = 60

pm.start_servers = 12
pm.min_spare_servers = 10
pm.max_spare_servers = 25

; Prevent memory leaks from long-running Laravel requests
pm.max_requests = 1000

; =========================
; PERFORMANCE TUNING
; =========================
request_terminate_timeout = 60s
request_slowlog_timeout = 5s

; Slow log (useful for debugging bottlenecks)
slowlog = /var/log/php-fpm/slow.log

; =========================
; SECURITY / STABILITY
; =========================
catch_workers_output = yes

; Prevent hanging processes
rlimit_files = 65535
rlimit_core = 0

; =========================
; LISTEN BACKLOG
; =========================
listen.backlog = 4096

; =========================
; ENV CLEANUP (important for security)
; =========================
clear_env = yes

; =========================
; LOGGING
; =========================
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php-fpm/error.log
